services:
  backend:
    build: ./backend
    container_name: backend_app
    ports:
      - "5000:5000"
    depends_on:
      - db
    environment:
      - MONGO_URI=mongodb://db:27017/reservas
    volumes:
      - ./backend/logs:/app/logs

  frontend:
    image: wildnest345/frontend:latest
    container_name: frontend_app
    ports:
      - "3000:80"
    depends_on:
      - backend

  db:
    image: mongo
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: