<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reservas - Restaurante</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header>
    <h1>🍽️ Reservas del Restaurante</h1>
  </header>

  <main>
    <!-- Formulario -->
    <section class="form-section">
      <h2>Nueva Reserva</h2>
      <div id="mensaje" class="mensaje hidden"></div>

      <div class="form-group">
        <label for="nombre">Nombre del cliente</label>
        <input type="text" id="nombre" placeholder="Ej: Juan Pérez" />
      </div>
      <div class="form-group">
        <label for="fecha">Fecha</label>
        <input type="date" id="fecha" />
      </div>
      <div class="form-group">
        <label for="hora">Hora</label>
        <input type="time" id="hora" />
      </div>
      <div class="form-group">
        <label for="personas">Número de personas</label>
        <input type="number" id="personas" min="1" max="20" placeholder="Ej: 4" />
      </div>

      <button id="btn-reservar">Crear Reserva</button>
    </section>

    <!-- Lista de reservas -->
    <section class="lista-section">
      <h2>Reservas Actuales</h2>
      <div id="lista-reservas">
        <p class="cargando">Cargando reservas...</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
